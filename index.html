<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TagVault</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --white:#fff; --bg:#f4f0f8; --sky:#e0f0ff; --sky2:#c4e0ff;
  --pink:#fde8f3; --pink2:#f8cce4; --border:#e4ddf0;
  --text:#48405e; --muted:#9890b4; --dim:#ccc6dc;
  --cs:#5a96c4; --cp:#c05888; --cm:#52a880;
  --cu:#8458b8; --ce:#c07838; --ct:#42a0ae;
  --sw:240px;
}
body { font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:grid; grid-template-columns:var(--sw) 1fr; grid-template-rows:54px 1fr; overflow:hidden; }

/* HEADER */
header { grid-column:1/-1; display:flex; align-items:center; padding:0 22px; gap:14px; background:var(--white); border-bottom:1px solid var(--border); }
.logo { font-size:15px; font-weight:700; display:flex; align-items:center; gap:7px; flex-shrink:0; }
.logo-dot { width:7px; height:7px; border-radius:50%; background:linear-gradient(135deg,var(--sky2),var(--pink2)); }
.hdiv { width:1px; height:18px; background:var(--border); }
.htabs { display:flex; gap:2px; }
.htab { background:none; border:none; font-family:inherit; font-size:13px; font-weight:500; color:var(--muted); padding:5px 13px; border-radius:7px; cursor:pointer; transition:all .14s; }
.htab:hover { background:var(--bg); color:var(--text); }
.htab.on { background:linear-gradient(120deg,rgba(196,224,255,.35),rgba(248,204,228,.35)); color:var(--text); font-weight:700; }
.hright { margin-left:auto; display:flex; align-items:center; gap:8px; }
.vbadge { font-family:'DM Mono',monospace; font-size:10px; color:var(--dim); background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:2px 8px; }
.hbtn { display:flex; align-items:center; gap:5px; padding:6px 13px; border-radius:8px; border:1.5px solid var(--border); background:var(--white); font-family:inherit; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; transition:all .14s; }
.hbtn:hover { border-color:var(--sky2); color:var(--cs); }
.hbtn.share { border-color:rgba(196,224,255,.6); color:var(--cs); }

/* SIDEBAR */
.sidebar { background:var(--white); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.sb-top { padding:12px 12px 8px; flex-shrink:0; }
.sb-label { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--dim); padding:0 4px; margin-bottom:6px; }
.sbox { display:flex; align-items:center; gap:6px; background:var(--bg); border-radius:7px; padding:6px 9px; border:1px solid transparent; transition:border-color .14s; }
.sbox:focus-within { border-color:var(--sky2); }
.sbox svg { color:var(--dim); flex-shrink:0; }
.sbox input { background:none; border:none; outline:none; font-family:inherit; font-size:12px; color:var(--text); width:100%; }
.sbox input::placeholder { color:var(--dim); }
.catlist { flex:1; overflow-y:auto; padding:4px 8px 10px; }
.catlist::-webkit-scrollbar { width:3px; }
.catlist::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
.catbtn { display:flex; align-items:center; gap:9px; padding:6px 8px; border-radius:8px; cursor:pointer; border:none; background:none; font-family:inherit; text-align:left; width:100%; transition:background .12s; position:relative; }
.catbtn:hover { background:var(--bg); }
.catbtn.on { background:linear-gradient(100deg,rgba(196,224,255,.3),rgba(248,204,228,.25)); }
.catbtn.on::before { content:''; position:absolute; left:0; top:22%; bottom:22%; width:2.5px; border-radius:3px; background:linear-gradient(180deg,var(--sky2),var(--pink2)); }
.catav { width:40px; height:40px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,var(--sky),var(--pink)); display:flex; align-items:center; justify-content:center; font-size:18px; overflow:hidden; border:1.5px solid var(--border); }
.catav img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.catinfo { flex:1; min-width:0; }
.catname { font-size:12.5px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.catbtn.on .catname { color:var(--cs); }
.catsub { font-size:10px; color:var(--dim); font-family:'DM Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.catn { font-size:10px; font-weight:700; color:var(--dim); font-family:'DM Mono',monospace; background:var(--bg); border:1px solid var(--border); border-radius:20px; padding:1px 6px; flex-shrink:0; }
.catbtn.on .catn { color:var(--cs); border-color:rgba(196,224,255,.6); background:rgba(196,224,255,.15); }
.sbfoot { padding:8px 12px; border-top:1px solid var(--border); font-size:10px; color:var(--dim); font-family:'DM Mono',monospace; flex-shrink:0; }

/* MAIN */
.main { overflow-y:auto; background:var(--bg); }
.main::-webkit-scrollbar { width:5px; }
.main::-webkit-scrollbar-thumb { background:var(--border); border-radius:5px; }

/* OVERVIEW */
.overview { padding:20px; }
.ovgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:14px; }
.ovcard { background:var(--white); border:1px solid var(--border); border-radius:14px; overflow:hidden; cursor:pointer; transition:box-shadow .18s,transform .18s,border-color .15s; }
.ovcard:hover { box-shadow:0 6px 24px rgba(160,180,220,.18); transform:translateY(-2px); border-color:var(--sky2); }
.ovthumb { width:100%; aspect-ratio:1; background:linear-gradient(135deg,var(--sky),var(--pink)); display:flex; align-items:center; justify-content:center; font-size:42px; overflow:hidden; position:relative; }
.ovthumb img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.ovstrip { position:absolute; inset:0; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:1px; }
.ovstrip img { width:100%; height:100%; object-fit:cover; position:static; }
.ovinfo { padding:10px 12px; border-top:1px solid var(--border); }
.ovname { font-size:13px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ovsub { font-size:10px; color:var(--dim); font-family:'DM Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ovempty { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 20px; gap:10px; color:var(--dim); }
.ovempty .ring { width:60px; height:60px; border-radius:50%; border:2px dashed var(--dim); display:flex; align-items:center; justify-content:center; font-size:24px; }

/* DETAIL */
.detail { padding:22px 26px 40px; display:none; }

/* HERO */
.hero { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:16px 20px; display:flex; align-items:center; gap:14px; margin-bottom:20px; position:relative; overflow:hidden; }
.hero::after { content:''; position:absolute; inset:0; background:linear-gradient(130deg,transparent 55%,rgba(196,224,255,.18) 75%,rgba(248,204,228,.15) 100%); pointer-events:none; }
.heroav { width:72px; height:72px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,var(--sky),var(--pink)); display:flex; align-items:center; justify-content:center; font-size:30px; overflow:hidden; border:2.5px solid var(--border); box-shadow:0 4px 14px rgba(180,200,240,.3); }
.heroav img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.herobody { flex:1; min-width:0; }
.heroname { font-size:17px; font-weight:700; letter-spacing:-.3px; margin-bottom:2px; }
.herotag { font-family:'DM Mono',monospace; font-size:11px; color:var(--cs); margin-bottom:7px; }
.herobadges { display:flex; gap:5px; flex-wrap:wrap; }
.badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; background:var(--bg); color:var(--muted); border:1px solid var(--border); }
.herobtns { display:flex; gap:5px; flex-shrink:0; }
.ibtn { width:30px; height:30px; border-radius:7px; border:1px solid var(--border); background:var(--white); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .14s; }
.ibtn:hover { background:var(--sky); border-color:var(--sky2); }

/* CAT GALLERY */
.cgal-section { margin-bottom:16px; }
.cgal-label { font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--dim); margin-bottom:8px; padding-left:2px; }
.gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
.gimgwrap { aspect-ratio:1; border-radius:8px; overflow:hidden; background:linear-gradient(135deg,var(--sky),var(--pink)); position:relative; cursor:pointer; }
.gimgwrap img { width:100%; height:100%; object-fit:cover; transition:transform .2s; }
.gimgwrap:hover img { transform:scale(1.06); }
.gimgdel { position:absolute; top:4px; right:4px; width:20px; height:20px; border-radius:50%; background:rgba(255,255,255,.9); border:none; font-size:11px; cursor:pointer; color:var(--cp); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; }
.gimgwrap:hover .gimgdel { opacity:1; }
.gadd { aspect-ratio:1; border-radius:8px; border:1.5px dashed var(--dim); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; cursor:pointer; background:none; color:var(--dim); font-size:10px; font-family:inherit; transition:all .15s; }
.gadd:hover { border-color:var(--sky2); color:var(--cs); background:rgba(196,224,255,.1); }

/* ENTRIES */
.entries { display:flex; flex-direction:column; gap:12px; }
.entry { background:var(--white); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:box-shadow .18s,transform .18s; position:relative; }
.entry:hover { box-shadow:0 5px 20px rgba(160,180,220,.14); transform:translateY(-1px); }
.entry.sel { border-color:var(--sky2); box-shadow:0 0 0 2px rgba(196,224,255,.4); }
.echk-wrap { position:absolute; top:10px; right:10px; z-index:2; }
.echk { width:20px; height:20px; border-radius:6px; border:1.5px solid var(--dim); background:var(--white); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; color:transparent; user-select:none; transition:all .14s; }
.echk:hover { border-color:var(--sky2); }
.entry.sel .echk { background:linear-gradient(135deg,var(--sky2),var(--pink2)); border-color:transparent; color:#607098; }
.ebody { padding:10px 14px 12px; }
.erow { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:7px; }
.etitle { font-size:11px; font-weight:700; color:var(--muted); }
.ebtns { display:flex; gap:4px; }
.copybtn { display:flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; border:1px solid var(--border); background:var(--bg); font-family:inherit; font-size:10px; font-weight:700; color:var(--muted); cursor:pointer; transition:all .14s; }
.copybtn:hover { border-color:var(--sky2); color:var(--cs); }
.delbtn { padding:3px 7px; border-radius:20px; border:1px solid transparent; background:none; font-size:11px; color:var(--dim); cursor:pointer; transition:all .14s; }
.delbtn:hover { color:var(--cp); background:rgba(248,204,228,.25); }
.tags { display:flex; flex-wrap:wrap; gap:4px; }
.chip { padding:3px 9px; border-radius:20px; font-size:10.5px; font-family:'DM Mono',monospace; cursor:pointer; border:1px solid; transition:all .12s; user-select:none; }
.chip:hover { transform:translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.06); }
.k0 { background:rgba(90,150,196,.1); color:var(--cs); border-color:rgba(90,150,196,.22); }
.k1 { background:rgba(192,88,136,.1); color:var(--cp); border-color:rgba(192,88,136,.22); }
.k2 { background:rgba(82,168,128,.1); color:var(--cm); border-color:rgba(82,168,128,.22); }
.k3 { background:rgba(132,88,184,.1); color:var(--cu); border-color:rgba(132,88,184,.22); }
.k4 { background:rgba(192,120,56,.1); color:var(--ce); border-color:rgba(192,120,56,.22); }
.k5 { background:rgba(66,160,174,.1); color:var(--ct); border-color:rgba(66,160,174,.22); }

/* ADD ENTRY BTN */
.addebtn { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; padding:11px; border:1.5px dashed var(--dim); border-radius:12px; background:none; font-family:inherit; font-size:12px; font-weight:600; color:var(--dim); cursor:pointer; margin-top:4px; transition:all .15s; }
.addebtn:hover { border-color:var(--sky2); color:var(--cs); background:rgba(196,224,255,.1); }

/* SUMMARY BOX */
.sumbox { margin-top:16px; background:var(--white); border:1.5px solid var(--sky2); border-radius:14px; overflow:hidden; }
.sumhead { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:linear-gradient(90deg,rgba(196,224,255,.25),rgba(248,204,228,.2)); border-bottom:1px solid var(--border); gap:10px; flex-wrap:wrap; }
.sumtitle { display:flex; align-items:center; gap:7px; font-size:12px; font-weight:700; }
.sumcnt { font-family:'DM Mono',monospace; font-size:10px; color:var(--cs); background:rgba(196,224,255,.3); border:1px solid rgba(196,224,255,.6); border-radius:20px; padding:1px 7px; font-weight:700; }
.sumacts { display:flex; align-items:center; gap:5px; }
.sepbtn { background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); cursor:pointer; transition:all .12s; }
.sepbtn.on { background:rgba(196,224,255,.3); border-color:var(--sky2); color:var(--cs); }
.scpbtn { display:flex; align-items:center; gap:5px; padding:5px 13px; border-radius:8px; border:none; background:linear-gradient(135deg,var(--sky2),var(--pink2)); font-family:inherit; font-size:11px; font-weight:700; color:#607098; cursor:pointer; transition:filter .14s,transform .14s; }
.scpbtn:hover { filter:brightness(.96); transform:translateY(-1px); }
.sumchips { padding:12px 16px; display:flex; flex-wrap:wrap; gap:5px; }
.schap { padding:3px 10px; border-radius:20px; font-size:10.5px; font-family:'DM Mono',monospace; cursor:pointer; background:rgba(196,224,255,.18); color:var(--cs); border:1px solid rgba(196,224,255,.45); transition:all .12s; user-select:none; }
.schap:hover { background:rgba(196,224,255,.38); transform:translateY(-1px); }

/* PAIR SECTION */
.pairsec { margin-top:16px; background:var(--white); border:1.5px solid var(--pink2); border-radius:14px; overflow:hidden; }
.pairhead { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:linear-gradient(90deg,rgba(248,204,228,.25),rgba(196,224,255,.2)); border-bottom:1px solid var(--border); }
.pairtitle { font-size:12px; font-weight:700; }
.pairempty { padding:16px; font-size:12px; color:var(--dim); text-align:center; }
.paircard { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--border); transition:background .12s; }
.paircard:last-child { border-bottom:none; }
.paircard:hover { background:rgba(248,232,243,.3); }
.pairav { width:38px; height:38px; border-radius:50%; flex-shrink:0; background:linear-gradient(135deg,var(--pink),var(--sky)); display:flex; align-items:center; justify-content:center; font-size:16px; overflow:hidden; border:1.5px solid var(--pink2); }
.pairav img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.pairbody { flex:1; min-width:0; }
.pairname { font-size:12px; font-weight:700; margin-bottom:5px; }
.pairtags { display:flex; flex-wrap:wrap; gap:4px; }
.pairacts { display:flex; gap:4px; flex-shrink:0; }

/* MERGE BAR */
.mbar { position:fixed; bottom:24px; left:calc(var(--sw) + 24px); right:24px; background:var(--white); border:1px solid var(--border); border-radius:14px; box-shadow:0 8px 32px rgba(140,120,180,.18); padding:14px 18px; display:flex; align-items:flex-start; gap:14px; z-index:50; transform:translateY(20px); opacity:0; pointer-events:none; transition:all .24s cubic-bezier(.34,1.56,.64,1); }
.mbar.on { opacity:1; transform:translateY(0); pointer-events:all; }
.mbar-left { flex:1; min-width:0; }
.mbar-hd { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.mbar-title { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; }
.mcnt { font-family:'DM Mono',monospace; font-size:10px; font-weight:700; background:linear-gradient(120deg,rgba(196,224,255,.5),rgba(248,204,228,.5)); border:1px solid var(--border); color:var(--cs); border-radius:20px; padding:1px 7px; }
.mclr { margin-left:auto; background:none; border:none; font-size:11px; color:var(--dim); cursor:pointer; font-family:inherit; }
.mclr:hover { color:var(--cp); }
.mpills { display:flex; flex-wrap:wrap; gap:5px; }
.mpill { display:flex; align-items:center; gap:5px; padding:3px 9px 3px 6px; border-radius:20px; font-size:11px; font-weight:600; border:1px solid var(--border); background:var(--bg); }
.mpilldot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.mpillx { background:none; border:none; cursor:pointer; color:var(--dim); font-size:12px; line-height:1; padding:0 0 0 2px; }
.mpillx:hover { color:var(--cp); }
.mbar-right { display:flex; flex-direction:column; gap:6px; flex-shrink:0; align-self:center; }
.mcopybtn { display:flex; align-items:center; gap:6px; padding:9px 18px; border-radius:10px; border:none; background:linear-gradient(135deg,var(--sky2),var(--pink2)); font-family:inherit; font-size:12px; font-weight:700; color:#607098; cursor:pointer; transition:filter .14s,transform .14s; white-space:nowrap; }
.mcopybtn:hover { filter:brightness(.96); transform:translateY(-1px); }
.mseps { display:flex; gap:4px; justify-content:center; }
.msepbtn { background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:2px 7px; font-family:'DM Mono',monospace; font-size:10px; color:var(--muted); cursor:pointer; transition:all .12s; }
.msepbtn.on { background:rgba(196,224,255,.3); border-color:var(--sky2); color:var(--cs); }

/* LIGHTBOX */
.lbox { position:fixed; inset:0; background:rgba(40,30,60,.7); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:200; opacity:0; pointer-events:none; transition:opacity .2s; }
.lbox.on { opacity:1; pointer-events:all; }
.lbox img { max-width:90vw; max-height:90vh; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.4); }
.lboxclose { position:absolute; top:20px; right:24px; background:rgba(255,255,255,.15); border:none; color:#fff; font-size:24px; cursor:pointer; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
.lboxclose:hover { background:rgba(255,255,255,.3); }

/* TOAST */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(10px); background:linear-gradient(120deg,var(--sky2),var(--pink2)); color:#58709a; font-size:12px; font-weight:700; padding:8px 18px; border-radius:30px; opacity:0; pointer-events:none; transition:all .2s; z-index:999; }
.toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

/* MODAL */
.overlay { position:fixed; inset:0; background:rgba(210,200,230,.35); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
.overlay.on { opacity:1; pointer-events:all; }
.modal { background:var(--white); border:1px solid var(--border); border-radius:16px; width:480px; max-width:92vw; max-height:88vh; overflow-y:auto; transform:scale(.95) translateY(10px); transition:transform .2s; box-shadow:0 14px 44px rgba(150,130,190,.18); }
.overlay.on .modal { transform:scale(1) translateY(0); }
.mhead { display:flex; align-items:center; justify-content:space-between; padding:17px 20px 15px; border-bottom:1px solid var(--border); background:linear-gradient(90deg,rgba(196,224,255,.25),rgba(248,204,228,.2)); border-radius:16px 16px 0 0; }
.mtitle { font-size:14px; font-weight:700; color:var(--cs); }
.mclose { background:none; border:none; color:var(--dim); font-size:18px; cursor:pointer; line-height:1; }
.mclose:hover { color:var(--cp); }
.mbody { padding:18px 20px; display:flex; flex-direction:column; gap:13px; }
.field { display:flex; flex-direction:column; gap:5px; }
.field label { font-size:10px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; }
.finput, .ftarea { background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:13px; padding:9px 11px; outline:none; width:100%; transition:border-color .14s,background .14s; }
.finput:focus, .ftarea:focus { border-color:var(--sky2); background:var(--white); }
.finput::placeholder, .ftarea::placeholder { color:var(--dim); }
.ftarea { resize:vertical; min-height:90px; font-family:'DM Mono',monospace; font-size:12px; }
.mfoot { display:flex; gap:7px; justify-content:flex-end; padding:13px 20px; border-top:1px solid var(--border); }
.cancelbtn { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:7px 15px; font-family:inherit; font-size:12px; font-weight:600; color:var(--muted); cursor:pointer; }
.cancelbtn:hover { border-color:var(--sky2); color:var(--cs); }
.savebtn { background:linear-gradient(135deg,var(--sky2),var(--pink2)); border:none; border-radius:8px; padding:7px 18px; font-family:inherit; font-size:12px; font-weight:700; color:#607098; cursor:pointer; }
.savebtn:hover { filter:brightness(.96); }

/* PROFILE UPLOAD */

/* VIEWER */
body.viewer .hbtn, body.viewer .addebtn, body.viewer .delbtn, body.viewer .echk-wrap, body.viewer .herobtns, body.viewer .mbar, body.viewer .gadd, body.viewer .gimgdel, body.viewer .pairsec, body.viewer .hbtn.share { display:none !important; }

/* PW SCREEN */
.pwscreen { position:fixed; inset:0; z-index:9999; background:linear-gradient(135deg,var(--sky),var(--pink)); display:flex; align-items:center; justify-content:center; }

/* FB BANNER */

<script>
// ══════════════════════════════════════════
// 🔥 FIREBASE CONFIG
// ══════════════════════════════════════════
const FB_CONFIG = {
  apiKey: "AIzaSyA5vlK5hwpfq0SCyn7HBezj0DpqmAtC65Y",
  authDomain: "character-prompt.firebaseapp.com",
  databaseURL: "https://character-prompt-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "character-prompt",
  storageBucket: "character-prompt.firebasestorage.app",
  messagingSenderId: "1078856893225",
  appId: "1:1078856893225:web:5c389bdd7ff151d7fead38"
};

// ── STATE ──
const params = new URLSearchParams(location.search);
const IS_VIEWER = params.has('view');
const PAIR_KEY  = params.get('pair') || '';
const PW_KEY    = 'tv_pw';
const PAIRK_KEY = 'tv_pairkey';

let db = null;
let cache = { artist:[], style:[], pair:[] };
let tab = 'artist';
let selId = null;
let editCatId = null;
let entryTarget = null;
let pendingAv = null;
let pendingPairAv = null;
let sepMode = 'comma';
let selEntries = new Map();
const PCOLS = ['#5a96c4','#c05888','#52a880','#8458b8','#c07838','#42a0ae'];
let pcolIdx = 0;

// ── FIREBASE LOAD ──
function loadFirebase() {
  const s1 = document.createElement('script');
  s1.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload = () => {
    const s2 = document.createElement('script');
    s2.src = 'https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js';
    s2.onload = () => initFirebase();
    s2.onerror = () => { document.getElementById('fbbanner').style.display='flex'; };
    document.head.appendChild(s2);
  };
  s1.onerror = () => { document.getElementById('fbbanner').style.display='flex'; };
  document.head.appendChild(s1);
}

function initFirebase() {
  try {
    firebase.initializeApp(FB_CONFIG);
    db = firebase.database().ref('tagvault');
    db.on('value', snap => {
      const v = snap.val() || {};
      cache = {
        artist: v.artist ? Object.values(v.artist) : [],
        style:  v.style  ? Object.values(v.style)  : [],
        pair:   v.pair   ? Object.values(v.pair)   : []
      };
      renderSidebar();
      renderOverview();
      if (selId) renderDetail(selId);
    });
  } catch(e) {
    console.error(e);
    document.getElementById('fbbanner').style.display = 'flex';
  }
}

function saveDB() {
  if (IS_VIEWER || !db) return;
  db.set({
    artist: cache.artist.length ? cache.artist : [],
    style:  cache.style.length  ? cache.style  : [],
    pair:   cache.pair.length   ? cache.pair   : []
  }).catch(e => alert('저장 실패: ' + e.message));
}

// ── IMAGE RESIZE ──
function resizeImg(dataUrl, maxSize, q, cb) {
  const img = new Image();
  img.onload = () => {
    let w = img.width, h = img.height;
    if (w > h) { if (w > maxSize) { h = h*maxSize/w; w = maxSize; } }
    else        { if (h > maxSize) { w = w*maxSize/h; h = maxSize; } }
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    cb(c.toDataURL('image/jpeg', q));
  };
  img.src = dataUrl;
}

function onProfileFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => resizeImg(ev.target.result, 300, .85, b64 => {
    pendingAv = b64;
    const p = document.getElementById('pavprev');
    p.innerHTML = `<img src="${b64}" alt="">`;
  });
  r.readAsDataURL(f);
}

function onPairProfileFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => resizeImg(ev.target.result, 300, .85, b64 => {
    pendingPairAv = b64;
    const p = document.getElementById('pairpavprev');
    p.innerHTML = `<img src="${b64}" alt="">`;
  });
  r.readAsDataURL(f);
}

function onGalleryFile(e, catId) {
  const files = Array.from(e.target.files); if (!files.length) return;
  const cats = cache[tab];
  const cat = cats.find(c => c.id === catId);
  if (!cat) return;
  if (!cat.gallery) cat.gallery = [];
  let done = 0;
  files.forEach(f => {
    const r = new FileReader();
    r.onload = ev => resizeImg(ev.target.result, 800, .82, b64 => {
      cat.gallery.push(b64);
      done++;
      if (done === files.length) { saveDB(); renderDetail(selId); }
    });
    r.readAsDataURL(f);
  });
  e.target.value = '';
}

function delGalImg(catId, idx) {
  const cat = cache[tab].find(c => c.id === catId);
  if (!cat) return;
  cat.gallery.splice(idx, 1);
  saveDB(); renderDetail(selId);
}

// ── SIDEBAR ──
function renderSidebar() {
  const cats = cache[tab] || [];
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = cats.filter(c => c.name.toLowerCase().includes(q) || (c.tag||'').toLowerCase().includes(q));
  document.getElementById('sblabel').textContent = tab === 'artist' ? '캐릭터명단' : '베이스프롬';
  document.getElementById('sbfoot').textContent = `${filtered.length} / ${cats.length}개`;
  document.getElementById('catlist').innerHTML = filtered.map(cat => {
    const av = cat.avatar ? `<img src="${cat.avatar}" alt="">` : (cat.emoji || '🏷️');
    return `<button class="catbtn ${cat.id===selId?'on':''}" onclick="selectCat('${cat.id}')">
      <div class="catav">${cat.avatar ? `<img src="${cat.avatar}" alt="">` : (cat.emoji||'🏷️')}</div>
      <div class="catinfo">
        <div class="catname">${esc(cat.name)}</div>
        ${cat.tag ? `<div class="catsub">${esc(cat.tag)}</div>` : ''}
      </div>
      <div class="catn">${(cat.entries||[]).length}</div>
    </button>`;
  }).join('');
}

// ── OVERVIEW ──
function renderOverview() {
  const cats = cache[tab] || [];
  const grid = document.getElementById('ovgrid');
  if (!cats.length) {
    grid.innerHTML = `<div class="ovempty"><div class="ring">🏷️</div><p>카테고리를 추가해보세요</p></div>`;
    return;
  }
  grid.innerHTML = cats.map(cat => {
    const g = cat.gallery || [];
    let thumb = '';
    if (cat.avatar) thumb = `<img src="${cat.avatar}" alt="">`;
    else if (g.length >= 4) thumb = `<div class="ovstrip">${g.slice(0,4).map(s=>`<img src="${s}" alt="">`).join('')}</div>`;
    else if (g.length > 0) thumb = `<img src="${g[0]}" alt="">`;
    else thumb = cat.emoji || '🏷️';
    return `<div class="ovcard" onclick="selectCat('${cat.id}')">
      <div class="ovthumb">${thumb}</div>
      <div class="ovinfo">
        <div class="ovname">${esc(cat.name)}</div>
        ${cat.tag ? `<div class="ovsub">${esc(cat.tag)}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── DETAIL ──
function selectCat(id) {
  selId = id;
  document.getElementById('overview').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  renderSidebar();
  renderDetail(id);
}

function renderDetail(id) {
  const cat = (cache[tab]||[]).find(c => c.id === id);
  if (!cat) return;
  const ks = ['k0','k1','k2','k3','k4','k5'];
  const entries = cat.entries || [];
  const gallery = cat.gallery || [];
  const pair = cache.pair || [];

  // gallery HTML
  const galHtml = `<div class="cgal-section">
    <div class="cgal-label">🖼️ 갤러리</div>
    <div class="gallery" id="catgal_${cat.id}">
      ${gallery.map((src,gi) => `
        <div class="gimgwrap" onclick="openLbox('${src.replace(/'/g,"\\'")}')">
          <img src="${src}" alt="">
          <button class="gimgdel" onclick="event.stopPropagation();delGalImg('${cat.id}',${gi})">✕</button>
        </div>`).join('')}
      <button class="gadd" onclick="document.getElementById('galinput_${cat.id}').click()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 15l5-5 4 4 3-3 4 4"/><circle cx="8.5" cy="8.5" r="1.5"/></svg>
        추가
      </button>
      <input type="file" id="galinput_${cat.id}" style="display:none" accept="image/*" multiple onchange="onGalleryFile(event,'${cat.id}')">
    </div>
  </div>`;

  // entries HTML
  const entriesHtml = entries.map((e, idx) => {
    const key = cat.id + '_' + idx;
    const isSel = selEntries.has(key);
    return `<div class="entry ${isSel?'sel':''}" id="entry_${key}">
      <div class="echk-wrap"><div class="echk" onclick="toggleEntry('${cat.id}',${idx},'${esc(e.title||'항목'+(idx+1))}')">${isSel?'✓':''}</div></div>
      <div class="ebody">
        <div class="erow">
          <div class="etitle">${e.title ? esc(e.title) : '태그 목록'}</div>
          <div class="ebtns">
            <button class="copybtn" onclick="cpAll('${cat.id}',${idx})">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>복사
            </button>
            <button class="delbtn" onclick="delEntry('${cat.id}',${idx})">✕</button>
          </div>
        </div>
        <div class="tags">${(e.tags||[]).map((t,i)=>`<span class="chip ${ks[i%6]}" onclick="cpTag('${esc(t)}')">${esc(t)}</span>`).join('')}</div>
      </div>
    </div>`;
  }).join('');

  // summary HTML
  const seen = new Set(); const allTags = [];
  entries.forEach(e => (e.tags||[]).forEach(t => { if(!seen.has(t)){seen.add(t);allTags.push(t);} }));
  const sumHtml = allTags.length ? `<div class="sumbox">
    <div class="sumhead">
      <div class="sumtitle">✨ 전체 통합 태그 <span class="sumcnt">${allTags.length}개</span></div>
      <div class="sumacts">
        <button class="sepbtn ${sepMode==='comma'?'on':''}" onclick="setSepAndRef('comma','${cat.id}')">쉼표</button>
        <button class="sepbtn ${sepMode==='newline'?'on':''}" onclick="setSepAndRef('newline','${cat.id}')">줄바꿈</button>
        <button class="scpbtn" onclick="cpSummary('${cat.id}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>한번에 복사
        </button>
      </div>
    </div>
    <div class="sumchips">${allTags.map(t=>`<span class="schap" onclick="cpTag('${esc(t)}')">${esc(t)}</span>`).join('')}</div>
  </div>` : '';

  // pair HTML (artist tab only)
  const pairHtml = tab === 'artist' ? `<div class="pairsec">
    <div class="pairhead">
      <div class="pairtitle">💘 Pair</div>
      <button class="scpbtn" onclick="openPairModal()" style="font-size:10px;padding:4px 10px">+ 추가</button>
    </div>
    ${pair.length === 0 ? '<div class="pairempty">Pair를 추가해보세요</div>' : pair.map((p,pi) => `
      <div class="paircard">
        <div class="pairav">${p.avatar ? `<img src="${p.avatar}" alt="">` : (p.emoji||'💘')}</div>
        <div class="pairbody">
          <div class="pairname">${esc(p.name)}</div>
          <div class="pairtags">${(p.tags||[]).map((t,i)=>`<span class="chip ${ks[i%6]}" onclick="cpTag('${esc(t)}')">${esc(t)}</span>`).join('')}</div>
        </div>
        <div class="pairacts">
          <button class="copybtn" onclick="cpPair(${pi})">복사</button>
          <button class="delbtn" onclick="delPair(${pi})">✕</button>
        </div>
      </div>`).join('')}
  </div>` : '';

  document.getElementById('detail').innerHTML = `
    <div class="hero">
      <div class="heroav">${cat.avatar ? `<img src="${cat.avatar}" alt="">` : (cat.emoji||'🏷️')}</div>
      <div class="herobody">
        <div class="heroname">${esc(cat.name)}</div>
        ${cat.tag ? `<div class="herotag">${esc(cat.tag)}</div>` : ''}
        <div class="herobadges">
          <span class="badge">항목 ${entries.length}개</span>
          <span class="badge">${tab==='artist'?'캐릭터명단':'베이스프롬'}</span>
        </div>
      </div>
      <div class="herobtns">
        <button class="ibtn" onclick="openEditCat('${cat.id}')">✏️</button>
        <button class="ibtn" onclick="delCat('${cat.id}')">🗑️</button>
      </div>
    </div>
    <div class="entries">${entriesHtml}</div>
    <button class="addebtn" onclick="openAddEntry('${cat.id}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>항목 추가
    </button>
    ${sumHtml}
    ${pairHtml}
    ${galHtml}
  `;
}

// ── SELECTION / MERGE ──
function toggleEntry(catId, idx, label) {
  const key = catId+'_'+idx;
  if (selEntries.has(key)) selEntries.delete(key);
  else selEntries.set(key, { catId, idx, label, color: PCOLS[pcolIdx++%PCOLS.length] });
  const card = document.getElementById('entry_'+key);
  if (card) {
    const isSel = selEntries.has(key);
    card.classList.toggle('sel', isSel);
    card.querySelector('.echk').textContent = isSel ? '✓' : '';
  }
  updateMbar();
}

function updateMbar() {
  document.getElementById('mcnt').textContent = selEntries.size+'개';
  document.getElementById('mpills').innerHTML = [...selEntries.entries()].map(([k,v])=>`
    <div class="mpill">
      <div class="mpilldot" style="background:${v.color}"></div>${esc(v.label)}
      <button class="mpillx" onclick="removeSel('${k}')">×</button>
    </div>`).join('');
  document.getElementById('mbar').classList.toggle('on', selEntries.size > 0);
}

function removeSel(key) {
  selEntries.delete(key);
  const c = document.getElementById('entry_'+key);
  if (c) { c.classList.remove('sel'); c.querySelector('.echk').textContent=''; }
  updateMbar();
}

function clearSel() {
  selEntries.forEach((_,k) => {
    const c = document.getElementById('entry_'+k);
    if (c) { c.classList.remove('sel'); c.querySelector('.echk').textContent=''; }
  });
  selEntries.clear(); updateMbar();
}

function mergeCopy() {
  const seen = new Set(); const all = [];
  [...selEntries.values()].forEach(({catId,idx}) => {
    const cat = [...(cache.artist||[]),...(cache.style||[])].find(c=>c.id===catId);
    if (cat && cat.entries && cat.entries[idx])
      cat.entries[idx].tags.forEach(t => { if(!seen.has(t)){seen.add(t);all.push(t);} });
  });
  cpText(all.join(sepMode==='newline'?'\n':', '), `✓ ${all.length}개 태그 복사됨`);
}

function setSep(m) {
  sepMode = m;
  document.getElementById('msepcomma').classList.toggle('on', m==='comma');
  document.getElementById('msepnl').classList.toggle('on', m==='newline');
}

function setSepAndRef(m, catId) {
  setSep(m); renderDetail(catId);
}

// ── COPY ──
function cpText(text, msg) {
  const done = () => { if(msg) toast(msg); };
  if (navigator.clipboard && location.protocol !== 'file:') {
    navigator.clipboard.writeText(text).then(done).catch(() => fbCp(text, done));
  } else fbCp(text, done);
}
function fbCp(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText='position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch{}
  document.body.removeChild(ta);
}
function cpTag(t) { cpText(t, `"${t}" 복사됨`); }
function cpAll(catId, idx) {
  const cat = [...(cache.artist||[]),...(cache.style||[])].find(c=>c.id===catId);
  if (cat && cat.entries && cat.entries[idx]) cpText(cat.entries[idx].tags.join(', '), '복사 완료');
}
function cpSummary(catId) {
  const cat = (cache[tab]||[]).find(c=>c.id===catId);
  if (!cat) return;
  const seen = new Set(); const all = [];
  (cat.entries||[]).forEach(e=>(e.tags||[]).forEach(t=>{if(!seen.has(t)){seen.add(t);all.push(t);}}));
  cpText(all.join(sepMode==='newline'?'\n':', '), `✓ ${all.length}개 태그 복사됨`);
}
function cpPair(pi) {
  const p = (cache.pair||[])[pi]; if(!p) return;
  cpText((p.tags||[]).join(', '), `💘 ${p.name} 복사됨`);
}

// ── TOAST ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('on'), 2200);
}

// ── LIGHTBOX ──
function openLbox(src) { document.getElementById('lboximg').src=src; document.getElementById('lbox').classList.add('on'); }
function closeLbox() { document.getElementById('lbox').classList.remove('on'); }

// ── SWITCH TAB ──
function switchTab(t) {
  tab = t; selId = null;
  document.querySelectorAll('.htab').forEach(b => b.classList.toggle('on', b.dataset.tab===t));
  document.getElementById('overview').style.display = 'block';
  document.getElementById('detail').style.display = 'none';
  renderSidebar(); renderOverview();
}

// ── CAT MODAL ──
function openAddCat() {
  editCatId = null; pendingAv = null;
  document.getElementById('catmodaltitle').textContent = '카테고리 추가';
  document.getElementById('catname').value = '';
  document.getElementById('cattag').value = '';
  document.getElementById('catemoji').value = tab==='artist'?'🎨':'✨';
  document.getElementById('pavprev').innerHTML = '🎨';
  document.getElementById('pavinput').value = '';
  document.getElementById('catmodal').classList.add('on');
}
function openEditCat(id) {
  const cat = (cache[tab]||[]).find(c=>c.id===id); if(!cat) return;
  editCatId = id; pendingAv = cat.avatar||null;
  document.getElementById('catmodaltitle').textContent = '카테고리 편집';
  document.getElementById('catname').value = cat.name;
  document.getElementById('cattag').value = cat.tag||'';
  document.getElementById('catemoji').value = cat.emoji||'🏷️';
  document.getElementById('pavprev').innerHTML = cat.avatar ? `<img src="${cat.avatar}" alt="">` : (cat.emoji||'🎨');
  document.getElementById('catmodal').classList.add('on');
}
function closeCatModal() { document.getElementById('catmodal').classList.remove('on'); }
function saveCat() {
  const name = document.getElementById('catname').value.trim();
  if (!name) return alert('이름을 입력하세요.');
  const tag = document.getElementById('cattag').value.trim();
  const emoji = document.getElementById('catemoji').value.trim() || '🏷️';
  const avatar = pendingAv || '';
  if (editCatId) {
    const cat = (cache[tab]||[]).find(c=>c.id===editCatId);
    if (cat) { cat.name=name; cat.tag=tag; cat.emoji=emoji; cat.avatar=avatar; }
  } else {
    if (!cache[tab]) cache[tab] = [];
    cache[tab].push({ id:'c'+Date.now(), name, tag, emoji, avatar, entries:[], gallery:[] });
  }
  saveDB(); closeCatModal();
}

function delCat(id) {
  if (!confirm('카테고리를 삭제할까요?')) return;
  cache[tab] = (cache[tab]||[]).filter(c=>c.id!==id);
  saveDB(); selId = null;
  document.getElementById('overview').style.display = 'block';
  document.getElementById('detail').style.display = 'none';
}

// ── ENTRY MODAL ──
function openAddEntry(catId) {
  entryTarget = catId;
  document.getElementById('entrytitle').value = '';
  document.getElementById('entrytags').value = '';
  document.getElementById('entrymodal').classList.add('on');
}
function closeEntryModal() { document.getElementById('entrymodal').classList.remove('on'); }
function saveEntry() {
  const title = document.getElementById('entrytitle').value.trim();
  const tags = document.getElementById('entrytags').value.split(/[\n,]+/).map(t=>t.trim()).filter(Boolean);
  if (!tags.length) return alert('태그를 최소 하나 입력하세요.');
  const cat = (cache[tab]||[]).find(c=>c.id===entryTarget);
  if (!cat) return;
  if (!cat.entries) cat.entries = [];
  cat.entries.push({ id:'e'+Date.now(), title, tags });
  saveDB(); closeEntryModal(); renderDetail(entryTarget);
}

function delEntry(catId, idx) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  const cat = (cache[tab]||[]).find(c=>c.id===catId);
  if (!cat) return;
  cat.entries.splice(idx,1);
  const key = catId+'_'+idx; selEntries.delete(key); updateMbar();
  saveDB(); renderDetail(catId);
}

// ── PAIR MODAL ──
function openPairModal() {
  pendingPairAv = null;
  document.getElementById('pairname').value = '';
  document.getElementById('pairemoji').value = '💘';
  document.getElementById('pairtags').value = '';
  document.getElementById('pairpavprev').innerHTML = '💘';
  document.getElementById('pairpavinput').value = '';
  document.getElementById('pairmodal').classList.add('on');
}
function closePairModal() { document.getElementById('pairmodal').classList.remove('on'); }
function savePair() {
  const name = document.getElementById('pairname').value.trim();
  if (!name) return alert('이름을 입력하세요.');
  const emoji = document.getElementById('pairemoji').value.trim() || '💘';
  const tags = document.getElementById('pairtags').value.split(/[\n,]+/).map(t=>t.trim()).filter(Boolean);
  if (!cache.pair) cache.pair = [];
  cache.pair.push({ name, emoji, avatar: pendingPairAv||'', tags });
  saveDB(); closePairModal(); if(selId) renderDetail(selId);
}
function delPair(pi) {
  if (!confirm('삭제할까요?')) return;
  cache.pair.splice(pi,1);
  saveDB(); if(selId) renderDetail(selId);
}

// ── VIEWER MODE ──
function simpleHash(s) {
  let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0;
  return String(h);
}
function getPwHash() {
  const urlPw = params.get('pw');
  if (urlPw) return urlPw;
  return localStorage.getItem(PW_KEY) || 'NO_PW';
}
function checkPw() {
  const val = document.getElementById('pwinput').value;
  const hash = getPwHash();
  if (hash === 'NO_PW' || simpleHash(val) === hash) {
    sessionStorage.setItem('tv_authed','1');
    document.getElementById('pwscreen').style.display = 'none';
    applyViewer();
  } else {
    document.getElementById('pwerr').classList.add('on');
    document.getElementById('pwinput').value = '';
  }
}
function applyViewer() {
  document.body.classList.add('viewer');
  if (PAIR_KEY) document.body.classList.add('showpair');
  document.getElementById('viewbadge').style.display = 'block';
  switchTab('artist');
}
function initViewer() {
  if (!IS_VIEWER) return;
  const hash = getPwHash();
  if (hash === 'NO_PW') { applyViewer(); return; }
  if (sessionStorage.getItem('tv_authed')==='1') { applyViewer(); return; }
  document.getElementById('pwscreen').style.display = 'flex';
}

// ── SHARE SETTINGS ──
function openShareSettings() {
  const newPw = prompt('뷰어 비밀번호 설정\n(빈칸으로 확인 = 비밀번호 없음)', '');
  if (newPw === null) return;
  localStorage.setItem(PW_KEY, newPw.trim() === '' ? 'NO_PW' : simpleHash(newPw.trim()));

  const newPairKey = prompt('Pair 공개 키 설정\n(이 키가 URL에 있으면 Pair 보임)', localStorage.getItem(PAIRK_KEY)||'secret');
  if (newPairKey !== null && newPairKey.trim()) localStorage.setItem(PAIRK_KEY, newPairKey.trim());

  const storedHash = localStorage.getItem(PW_KEY)||'NO_PW';
  const pwParam = storedHash !== 'NO_PW' ? `&pw=${storedHash}` : '';
  const pairKey = localStorage.getItem(PAIRK_KEY)||'secret';
  const base = location.href.split('?')[0];
  document.getElementById('sharelink1').value = `${base}?view=1${pwParam}`;
  document.getElementById('sharelink2').value = `${base}?view=1${pwParam}&pair=${pairKey}`;
  document.getElementById('sharecpbtn1').textContent = '복사';
  document.getElementById('sharecpbtn2').textContent = '복사';
  document.getElementById('sharecpbtn1').classList.remove('done');
  document.getElementById('sharecpbtn2').classList.remove('done');
  document.getElementById('sharepop').classList.add('on');
}
function closeSharePop() { document.getElementById('sharepop').classList.remove('on'); }
function cpShareLink(inputId, btnId) {
  const val = document.getElementById(inputId).value;
  const btn = document.getElementById(btnId);
  cpText(val, '');
  btn.textContent = '✓ 복사됨'; btn.classList.add('done');
  setTimeout(()=>{ btn.textContent='복사'; btn.classList.remove('done'); }, 2000);
}

// ── UTILS ──
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── INIT ──
loadFirebase();
initViewer();
</script>
